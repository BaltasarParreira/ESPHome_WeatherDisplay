- obj:
    x: 0
    y: 0
    width: 100%
    height: 100%
    bg_color: 0x000000
    bg_opa: 100%
    radius: 0
    border_width: 0
    pad_all: 0
    scrollable: false
    scrollbar_mode: "off"
    layout:
      type: flex
      flex_flow: column
      flex_align_main: center
      flex_align_cross: center
      flex_align_track: center
      pad_row: 8px
    widgets:
      - label:
          id: clock_saver_time
          text_font: xxxl
          text_color: white
          text_align: center
      - label:
          id: clock_saver_date
          text_font: xxl
          text_color: white
          text_align: center
