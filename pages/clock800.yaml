- obj:
    #id: clock_screensaver
    x: 0
    y: 0
    width: 100%
    height: 100%
    bg_color: 0x000000
    bg_opa: 100%
    radius: 0
    border_width: 0
    pad_all: 0
    scrollable: false
    scrollbar_mode: "off"
    #hidden: true
    widgets:
      - label:
          #id: clock_label
          #text_font: xxxl
          #text_color: 0xFFFFFF
          #text: "00:00"
          id: clock_saver_time
          text_font: xxxl
          text_color: white
          align: center
          text_align: center
          #pad_top: 6px
      - label:
          #id: clock_label
          #text_font: xxxl
          #text_color: 0xFFFFFF
          #text: "00:00"
          id: clock_saver_date
          text_font: xxl
          text_color: white
          align: center
          text_align: center
          #pad_top: 6px
