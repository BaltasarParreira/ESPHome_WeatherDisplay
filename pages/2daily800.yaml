
- obj:
    width: 100%
    height: 100%
    bg_opa: 100%
    border_opa: transp
    bg_image_src: bg_img
    bg_image_opa: 100%
    radius: 0px
    layout:
      type: flex
      flex_flow: row_wrap
      flex_align_main: center
    scrollbar_mode: "OFF"
    widgets:
	
     # WEEKLY FORECAST
      - obj:
          width: 155
          height: 400
          bg_color: black
          bg_opa: 70%
          border_opa: transp
          radius: 15px
          layout:
            type: flex
            flex_flow: column_wrap
            flex_align_cross: center
            flex_align_track: center
          scrollbar_mode: "OFF"
          widgets:
            - label:
                id: lbl_day1_time
                text_font: xlg
                text_color: white
                pad_top: -10px
                pad_bottom: -5px
            - image:
                id: img_day1_code
                src: missing
                align: center
                pad_top: -15px
                pad_bottom: -25px
            - label:
                id: lbl_day1_cond
                align: center
                text_font: sm
                text_color: white
                pad_bottom: 30px
            - label:
                align: center
                text_font: xxsm
                text_color: white
                text: "HIGH / LOW"
            - label:
                align: center
                id: lbl_day1_temp
                text_font: sm
                text_color: white
                pad_top: -10px
            - label:
                align: center
                text_font: xxsm
                text_color: white
                text: "PRECIPITATIONS"
            - label:
                align: center
                id: lbl_day1_pre
                text_font: sm
                text_color: white
                pad_top: -10px
            - label:
                align: center
                text_font: xxsm
                text_color: white
                text: "WIND SPEED"
            - label:
                align: center
                id: lbl_day1_wind
                text_font: sm
                text_color: white
                pad_top: -10px

