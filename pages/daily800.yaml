
- obj:
    width: 100%
    height: 100%
    bg_opa: 100%
    border_opa: transp
    bg_image_src: bg_img
    bg_image_opa: 100%
    radius: 0px
    layout:
      type: flex
      flex_flow: row_wrap
      flex_align_main: center
    scrollbar_mode: "OFF"
    widgets:

      # CURRENT WEATHER
      - obj:
          width: 100%
          height: 350
          bg_color: black
          bg_opa: 50%
          border_opa: transp
          border_width: 0
          shadow_width: 0
          radius: 15px
          layout:
            type: flex
            flex_flow: column               # Changed from row to column to stack rows
            flex_align_main: start     # Aligns rows to the top
            flex_align_cross: center   # Centers rows horizontally
            #flex_align_track: center
            pad_row: 0       # Space between stacked rows
            pad_column: 0    # Space between side-by-side columns (if any)
          align: top_mid
          widgets:
