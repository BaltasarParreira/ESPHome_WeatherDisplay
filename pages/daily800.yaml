- obj:
    width: 100%
    height: 100%
    bg_opa: 100%
    border_opa: transp
    bg_image_src: bg_img
    bg_image_opa: 100%
    radius: 0px
    layout:
      type: flex
      flex_flow: column
      flex_align_main: center
      flex_align_cross: center
    scrollbar_mode: "OFF"
    widgets:

      # CURRENT WEATHER CONTAINER (Centered on 800x480 screen)
      - obj:
          width: 95%
          height: 420px        # Increased height for 480px total screen
          bg_color: black
          bg_opa: 50%
          border_opa: transp
          radius: 20px
          layout:
            type: flex
            flex_flow: column
            flex_align_main: start
            flex_align_cross: center
            pad_row: 10        # Small gap between row 1 and row 2
          widgets:
            
            # ROW 1: ICON AND TIME
            - obj:
                width: 100%
                height: 150px
                bg_opa: transp
                border_opa: transp
                layout:
                  type: flex
                  flex_flow: row
                  flex_align_cross: center
                widgets:
                  # Column: Icon & Condition
                  - obj:
                      width: 50%
                      layout:
                        type: flex
                        flex_flow: column
                        flex_align_main: center
                        flex_align_cross: center
                      widgets:
                        - image:
                           id: img_day0_code
                           src: missing
                           width: 110px
                           height: 110px
                        - label:
                           id: lbl_day0_cond
                           text_font: lg
                           text_color: white
                           pad_top: -25px
                  # Column: Clock
                  - obj:
                      width: 50%
                      layout:
                        type: flex
                        flex_flow: column
                        flex_align_main: center
                        flex_align_cross: center
                      widgets:
                        - label:
                           id: lbl_datetime
                           text_font: xlg
                           text_color: white
                           text_align: center

            # ROW 2: 4-COLUMN STATS GRID
            - obj:
                width: 100%
                height: 230px
                bg_opa: transp
                border_opa: transp
                layout:
                  type: flex
                  flex_flow: row
                  flex_align_main: space_around
                  flex_align_cross: center
                widgets:
                  # Template for all 4 columns
                  - obj: &stat_col
                      width: 23%
                      layout:
                        type: flex
                        flex_flow: column
                        flex_align_cross: center
                      widgets:
                        - label: {text: "TEMPERATURE", text_font: xsm, text_color: white}
                        - label: {id: lbl_day0_curtemp, text_font: md, text_color: white, pad_top: -10px}
                        - label: {text: "HUMIDITY", text_font: xsm, text_color: white, pad_top: 15px}
                        - label: {id: lbl_day0_curhum, text_font: md, text_color: white, pad_top: -10px}

                  # Column 2
                  - obj:
                      <<: *stat_col
                      widgets:
                        - label: {text: "HIGH / LOW", text_font: xsm, text_color: white}
                        - label: {id: lbl_day0_temp, text_font: md, text_color: white, pad_top: -10px}
                        - label: {text: "PRECIPITATION", text_font: xsm, text_color: white, pad_top: 15px}
                        - label: {id: lbl_day0_pre, text_font: md, text_color: white, pad_top: -10px}

                  # Column 3
                  - obj:
                      <<: *stat_col
                      widgets:
                        - label: {text: "WIND SPEED", text_font: xsm, text_color: white}
                        - label: {id: lbl_day0_wind, text_font: md, text_color: white, pad_top: -10px}
                        - label: {text: "PRESSURE", text_font: xsm, text_color: white, pad_top: 15px}
                        - label: {id: lbl_day0_pres, text_font: md, text_color: white, pad_top: -10px}

                  # Column 4
                  - obj:
                      <<: *stat_col
                      widgets:
                        - label: {text: "SUNRISE", text_font: xsm, text_color: white}
                        - label: {id: lbl_day0_sunr, text_font: md, text_color: white, pad_top: -10px}
                        - label: {text: "SUNSET", text_font: xsm, text_color: white, pad_top: 15px}
                        - label: {id: lbl_day0_suns, text_font: md, text_color: white, pad_top: -10px}


            # FOOTER
            - label:
                id: lbl_last_update
                text_font: xsm
                text_color: gray
                align: bottom_mid



      # WEEKLY FORECAST
      - obj:
          width: 155
          height: 400
          bg_color: black
          bg_opa: 70%
          border_opa: transp
          radius: 15px
          layout:
            type: flex
            flex_flow: column_wrap
            flex_align_cross: center
            flex_align_track: center
          scrollbar_mode: "OFF"
          widgets:
            - label:
                id: lbl_day1_time
                text_font: xlg
                text_color: white
                pad_top: -10px
                pad_bottom: -5px
            - image:
                id: img_day1_code
                src: missing
                align: center
                pad_top: -15px
                pad_bottom: -25px
            - label:
                id: lbl_day1_cond
                align: center
                text_font: sm
                text_color: white
                pad_bottom: 30px
            - label:
                align: center
                text_font: xxsm
                text_color: white
                text: "HIGH / LOW"
            - label:
                align: center
                id: lbl_day1_temp
                text_font: sm
                text_color: white
                pad_top: -10px
            - label:
                align: center
                text_font: xxsm
                text_color: white
                text: "PRECIPITATIONS"
            - label:
                align: center
                id: lbl_day1_pre
                text_font: sm
                text_color: white
                pad_top: -10px
            - label:
                align: center
                text_font: xxsm
                text_color: white
                text: "WIND SPEED"
            - label:
                align: center
                id: lbl_day1_wind
                text_font: sm
                text_color: white
                pad_top: -10px

