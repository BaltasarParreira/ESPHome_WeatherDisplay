- obj:
    width: 100%
    height: 100%
    bg_opa: 100%
    border_opa: transp
    border_width: 0
    shadow_width: 0
    radius: 0
    bg_image_src: bg_img
    bg_image_opa: 100%
    layout:
      type: flex
      flex_flow: row_wrap
      flex_align_main: center
      flex_align_cross: center
      pad_row: 0
      pad_column: 0
    scrollbar_mode: "OFF"
    widgets:

      # CURRENT WEATHER
      - obj:
          width: 100%
          height: 280
          bg_color: black
          bg_opa: 50%
          border_opa: transp
          border_width: 0
          shadow_width: 0
          radius: 15
          layout:
            type: flex
            flex_flow: column
            flex_align_main: start
            flex_align_cross: center
            pad_row: 0
            pad_column: 0
          align: top_mid
          widgets:

            # TOP ROW
            - obj:
                width: 100%
                height: 100
                bg_opa: transp
                border_opa: transp
                border_width: 0
                shadow_width: 0
                radius: 0
                layout:
                  type: flex
                  flex_flow: row
                  flex_align_cross: center
                  flex_align_track: center
                  pad_row: 0
                  pad_column: 0
                pad_top: 0
                pad_bottom: 0
                widgets:

                  # LEFT SIDE
                  - obj:
                      styles: clean_box
                      width: 47%
                      bg_opa: transp
                      border_opa: transp
                      border_width: 0
                      shadow_width: 0
                      radius: 0
                      layout:
                        type: flex
                        flex_flow: column
                        flex_align_cross: center
                        flex_align_main: center
                        pad_row: 0
                        pad_column: 0
                      scrollbar_mode: "OFF"
                      widgets:
                        - image:
                            id: img_day0_code
                            src: missing
                            width: 80
                            height: 80
                        - label:
                            id: lbl_day0_cond
                            text_font: lg
                            text_color: white
                            pad_top: -10   # was -20, reduced to avoid clipping line

                  # RIGHT SIDE
                  - obj:
                      styles: clean_box
                      width: 53%
                      bg_opa: transp
                      border_opa: transp
                      border_width: 0
                      shadow_width: 0
                      radius: 0
                      layout:
                        type: flex
                        flex_flow: column
                        flex_align_cross: center
                        flex_align_main: center
                        pad_row: 0
                        pad_column: 0
                      align: right_mid
                      scrollbar_mode: "OFF"
                      widgets:
                        - label:
                            id: lbl_datetime
                            text_font: xlg
                            text_color: white

            # SECOND ROW (METRICS)
            - obj:
                width: 100%
                height: 150
                bg_opa: transp
                border_opa: transp
                border_width: 0
                shadow_width: 0
                radius: 0
                layout:
                  type: flex
                  flex_flow: row
                  flex_align_cross: space_around
                  flex_align_track: space_around
                  pad_row: 0
                  pad_column: 0
                pad_top: 0
                pad_bottom: 0
                widgets:
                  - obj:
                      width: 25%
                      bg_opa: transp
                      border_opa: transp
                      border_width: 0
                      shadow_width: 0
                      layout:
                        type: flex
                        flex_flow: column
                        flex_align_cross: center
                        flex_align_track: center
                      scrollbar_mode: "OFF"
                      widgets:
                        - label:
                            align: center
                            text_font: xsm
                            text_color: white
                            text: "TEMPERATURE"
                        - label:
                            id: lbl_day0_curtemp
                            align: center
                            text_font: md
                            text_color: white
                            pad_top: -15px
                        - label:
                            align: center
                            text_font: xsm
                            text_color: white
                            text: "HUMIDITY"
                        - label:
                            id: lbl_day0_curhum
                            align: center
                            text_font: md
                            text_color: white
                            pad_top: -15px
                            pad_bottom: -15px
                  - obj:
                      width: 25%
                      bg_opa: transp
                      border_opa: transp
                      border_width: 0
                      shadow_width: 0
                      layout:
                        type: flex
                        flex_flow: column
                        flex_align_cross: center
                        flex_align_track: center
                      scrollbar_mode: "OFF"
                      widgets:
                        - label:
                            align: center
                            text_font: xsm
                            text_color: white
                            text: "HIGH / LOW"
                        - label:
                            id: lbl_day0_temp
                            align: center
                            text_font: md
                            text_color: white
                            pad_top: -15px
                        - label:
                            align: center
                            text_font: xsm
                            text_color: white
                            text: "PRECIPITATIONS"
                        - label:
                            id: lbl_day0_pre
                            align: center
                            text_font: md
                            text_color: white
                            pad_top: -15px
                            pad_bottom: -15px
                  - obj:
                      width: 25%
                      bg_opa: transp
                      border_opa: transp
                      border_width: 0
                      shadow_width: 0
                      layout:
                        type: flex
                        flex_flow: column
                        flex_align_cross: center
                        flex_align_track: center
                      scrollbar_mode: "OFF"
                      widgets:
                        - label:
                            align: center
                            text_font: xsm
                            text_color: white
                            text: "WIND SPEED"
                        - label:
                            id: lbl_day0_wind
                            align: center
                            text_font: md
                            text_color: white
                            pad_top: -15px
                        - label:
                            align: center
                            text_font: xsm
                            text_color: white
                            text: "PRESSURE"
                        - label:
                            id: lbl_day0_pres
                            align: center
                            text_font: md
                            text_color: white
                            pad_top: -15px
                            pad_bottom: -15px
                  - obj:
                      width: 25%
                      bg_opa: transp
                      border_opa: transp
                      border_width: 0
                      shadow_width: 0
                      layout:
                        type: flex
                        flex_flow: column
                        flex_align_cross: center
                        flex_align_track: center
                      scrollbar_mode: "OFF"
                      widgets:
                        - label:
                            align: center
                            text_font: xsm
                            text_color: white
                            text: "SUNRISE"
                        - label:
                            id: lbl_day0_sunr
                            align: center
                            text_font: md
                            text_color: white
                            pad_top: -15px
                        - label:
                            align: center
                            text_font: xsm
                            text_color: white
                            text: "SUNSET"
                        - label:
                            id: lbl_day0_suns
                            align: center
                            text_font: md
                            text_color: white
                            pad_top: -15px
                            pad_bottom: -15px


            # LAST UPDATE LABEL
            - label:
                id: lbl_last_update
                align: right_mid
                text_font: xxsm
                text_color: white
                pad_top: 0
                pad_bottom: 0


      # THIRD ROW (INSIDE/OUTSIDE, TEMP/HUM)
      
      - obj:
          width: 100%               # Fills the screen width to maximize the gap spacing
          height: 160px             # Tall enough to cleanly hold your 150px child containers
          bg_opa: transp            # Invisible wrapper container
          border_opa: transp
          pad_all: 0
          layout:
            type: flex
            flex_flow: row          # Forces the two items inside to sit side-by-side
            flex_align_main: space_between # Pushes elements apart to create the middle gap
            flex_align_cross: center
          scrollbar_mode: "OFF"
          widgets:
              # LEFT SIDE
              - obj:
                    width: 350
                    height: 150
                    bg_color: black
                    bg_opa: 50%
                    border_opa: transp
                    radius: 15px
                    layout:
                      type: flex
                      flex_flow: column_wrap
                      flex_align_cross: center
                      flex_align_track: center
                    scrollbar_mode: "OFF"
                    widgets:
                      - label:
                          align: center
                          text_font: xsm
                          text_color: white
                          text: "TEMPERATURE"
                      # INSIDE
                      - label:
                          id: lbl_l_inside_temp
                          align: left_mid
                          text_font: md
                          text_color: white
                          pad_top: 0
                          pad_bottom: 0
                      - label:
                          id: lbl_w_inside_temp
                          align: left_mid
                          text_font: md
                          text_color: white
                          pad_top: 0
                          pad_bottom: 0
                      # OUTSIDE
                      - label:
                          id: lbl_outside_temp
                          align: left_mid
                          text_font: md
                          text_color: white
                          pad_top: 0
                          pad_bottom: 10

              # RIGHT SIDE
              - obj:
                    width: 350
                    height: 150
                    bg_color: black
                    bg_opa: 50%
                    border_opa: transp
                    radius: 15px
                    layout:
                      type: flex
                      flex_flow: column_wrap
                      flex_align_cross: center
                      flex_align_track: center
                    scrollbar_mode: "OFF"
                    widgets:
                      - label:
                          align: center
                          text_font: xsm
                          text_color: white
                          text: "HUMIDITY"
                      # INSIDE
                      - label:
                          id: lbl_inside_hum
                          align: left_mid
                          text_font: md
                          text_color: white
                          pad_top: 0
                          pad_bottom: 0
                      # OUTSIDE
                      - label:
                          id: lbl_outside_hum
                          align: left_mid
                          text_font: md
                          text_color: white
                          pad_top: 0
                          pad_bottom: 0
