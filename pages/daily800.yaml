
- obj:
    width: 100%
    height: 100%
    bg_opa: 100%
    border_opa: transp
    bg_image_src: bg_img
    bg_image_opa: 100%
    radius: 0px
    layout:
      type: flex
      flex_flow: row_wrap
      flex_align_main: center
    scrollbar_mode: "OFF"
    widgets:

      # CURRENT WEATHER
      - obj:
          width: 100%
          height: 350
          bg_color: black
          bg_opa: 70%
          border_opa: transp
          radius: 15px
          layout:
            type: flex
            flex_flow: column
            flex_align_cross: center
            flex_align_track: center
          widgets:
            - label:
                id: lbl_datetime
                text_font: xlg
                text_color: white
            - obj:
                width: 500px
                height: 50px
                bg_opa: transp
                border_opa: transp
                layout:
                  type: flex
                  flex_flow: row
                  flex_align_cross: center
                  flex_align_track: center
                pad_top: -30px
                pad_bottom: -30px
                align: center
                widgets:
                  - image:
                      id: img_day0_code
                      src: missing
                  - label:
                      id: lbl_day0_cond
                      text_font: lg
                      text_color: white

