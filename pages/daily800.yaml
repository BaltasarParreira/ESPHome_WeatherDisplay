                  flex_align_cross: center
                  flex_align_track: center
                pad_top: 0px
                pad_bottom: 0px
                align: center
                widgets:
                  - obj:
                      styles: clean_box
                      width: 50%
                      bg_opa: transp
                      border_opa: transp
                      border_width: 0
                      shadow_width: 0
                      layout:
                        type: flex
                        flex_flow: column
                        flex_align_cross: center
                        #flex_align_track: center
                        flex_align_main: center
                        pad_row: 0
                      scrollbar_mode: "OFF"
