    # -----------------------------------------------------
    # PAGE 3 — DHW THERMOSTAT PAGE
    # -----------------------------------------------------
#    - id: dhw_page
#      widgets:

        # -----------------------------------------------
        # MAIN DHW CONTAINER (dark 50% background)
        # -----------------------------------------------
        - obj:
            width: 100%
            height: 100%
            bg_color: black
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:

              # -----------------------------------------
              # ARC (centered)
              # -----------------------------------------
              - arc:
                  id: ch_arc
                  align: CENTER
                  x: 0
                  width: 420
                  height: 420
                  adjustable: true
                  value: 50
                  min_value: 30
                  max_value: 80
                  arc_width: 24
                  arc_color: 0x292929
                  border_width: 0
                  radius: 0
                  indicator:
                    arc_color: 0x2095F6
                    arc_width: 24
                  knob:
                    bg_color: 0xFFFFFF
#                  on_value:
#                    then:
#                      - homeassistant.service:
#                          service: number.set_value
#                          data:
#                            entity_id: number.hot_water_setpoint
#                            value: !lambda "return x;"

              # -----------------------------------------
              # CURRENT DHW TEMPERATURE
              # -----------------------------------------
              - label:
                  id: dhw_current_temp
                  text_font: xlg
                  text_color: white
                  text_align: center
                  text: "-- °C"

              # -----------------------------------------
              # SETPOINT LABEL
              # -----------------------------------------
              - label:
                  id: dhw_setpoint_label
                  text_font: lg
                  text_color: white
                  text_align: center
                  text: "DHW Setpoint"

              # -----------------------------------------
              # DHW ENABLE / DISABLE BUTTON
              # -----------------------------------------
              - button:
                  id: btn_dhw_enable
                  width: 160
                  height: 60
                  bg_color: black
                  bg_opa: 60%
                  radius: 12
                  widgets:
                    - label:
                        id: dhw_enable_label
                        text_font: mdb
                        text_color: white
                        text: "DHW OFF"
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.toggle
                          data:
                            entity_id: switch.hot_water_enable

        # -----------------------------------------------
        # BACK TO CH PAGE (top-left)
        # -----------------------------------------------
        - button:
            id: btn_dhw_to_ch
            align: top_left
            x: 20
            y: -20
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  text: "\U000F04D2"   # mdi-arrow-left
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: ch_page
                  animation: MOVE_RIGHT
                  time: 300ms

        # -----------------------------------------------
        # BACK TO WEATHER PAGE (top-right)
        # -----------------------------------------------
        - button:
            id: btn_dhw_to_weather
            align: top_right
            x: -20
            y: -20
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  text: "\U000F02DC"   # mdi-home
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: daily_page
                  animation: MOVE_RIGHT
                  time: 300ms
