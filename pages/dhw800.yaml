    # -----------------------------------------------------
    # PAGE 3 — DHW THERMOSTAT PAGE
    # -----------------------------------------------------
#    - id: dhw_page
      widgets:

        # -----------------------------------------------
        # BACK TO CH PAGE (top-left)
        # -----------------------------------------------
        - button:
            id: btn_dhw_to_ch
            align: top_left
            x: 10
            y: 10
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  text: "\U000F04D2"   # mdi-arrow-left
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: ch_page
                  animation: MOVE_RIGHT
                  time: 300ms

        # -----------------------------------------------
        # BACK TO WEATHER PAGE (top-right)
        # -----------------------------------------------
        - button:
            id: btn_dhw_to_weather
            align: top_right
            x: -10
            y: 10
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  text: "\U000F02DC"   # mdi-home
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: weather_page
                  animation: MOVE_RIGHT
                  time: 300ms

        # -----------------------------------------------
        # MAIN DHW CONTAINER (dark 50% background)
        # -----------------------------------------------
        - obj:
            width: 100%
            height: 100%
            bg_color: black
            bg_opa: 50%
            radius: 15
            layout:
              type: flex
              flex_flow: column
              flex_align_main: center
              flex_align_cross: center
            widgets:

              # -----------------------------------------
              # LARGE ARC (300px)
              # -----------------------------------------
              - arc:
                  id: dhw_arc
                  width: 300
                  height: 300
                  rotation: 135
                  bg_angles:
                    start: 0
                    end: 360
                  value_angles:
                    start: 0
                    end: 270
                  min_value: 30
                  max_value: 80
                  value: 60
                  on_value:
                    then:
                      - homeassistant.service:
                          service: number.set_value
                          data:
                            entity_id: number.hot_water_setpoint
                            value: !lambda "return x;"

              # -----------------------------------------
              # CURRENT DHW TEMPERATURE
              # -----------------------------------------
              - label:
                  id: dhw_current_temp
                  text_font: xlg
                  text_color: white
                  text_align: center
                  text: "-- °C"

              # -----------------------------------------
              # SETPOINT LABEL
              # -----------------------------------------
              - label:
                  id: dhw_setpoint_label
                  text_font: lg
                  text_color: white
                  text_align: center
                  text: "DHW Setpoint"

              # -----------------------------------------
              # DHW ENABLE / DISABLE BUTTON
              # -----------------------------------------
              - button:
                  id: btn_dhw_enable
                  width: 160
                  height: 60
                  bg_color: black
                  bg_opa: 60%
                  radius: 12
                  widgets:
                    - label:
                        id: dhw_enable_label
                        text_font: mdb
                        text_color: white
                        text: "DHW OFF"
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.toggle
                          data:
                            entity_id: switch.hot_water_enable
