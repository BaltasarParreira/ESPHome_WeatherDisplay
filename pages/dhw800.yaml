    # -----------------------------------------------------
    # PAGE 3 — DHW THERMOSTAT PAGE
    # -----------------------------------------------------
#    - id: dhw_page
#      widgets:

        # -----------------------------------------------
        # MAIN DHW CONTAINER (dark 50% background)
        # -----------------------------------------------
        - obj:
            width: 100%
            height: 100%
            bg_color: black
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:

              # -----------------------------------------
              # ARC (centered)
              # -----------------------------------------
              - arc:
                  id: dhw_arc
                  align: CENTER
                  x: 0
                  width: 420
                  height: 420
                  adjustable: true
                  value: 50
                  min_value: 35
                  max_value: 60
                  arc_width: 24
                  arc_color: 0x292929
                  border_width: 0
                  radius: 0
                  indicator:
                    arc_color: 0x2095F6
                    arc_width: 24
                  knob:
                    bg_color: 0xFFFFFF
                  on_value:
                    then:
                      # 1. Update the label immediately
                      - lvgl.label.update:
                          id: dhw_setpoint_label
                          text: !lambda |-
                            char buf[16];
                            snprintf(buf, sizeof(buf), "%.1f°", x);
                            return std::string(buf);

                      # 2. Only write to HA if API is connected (prevents crashes)
#                      - if:
#                          condition:
#                            api.connected:
#                          then:
#                            - homeassistant.service:
#                                service: climate.set_temperature
#                                data:
#                                  entity_id: climate.opentherm_gateway_heating_climate
#                                  temperature: !lambda "return x;"

              # -----------------------------------------
              # CURRENT DHW TEMPERATURE
              # -----------------------------------------
              - label:
                  id: dhw_current_temp
                  align: CENTER
                  text: "--.-°"
                  y: -90
                  text_color: 0xFFFFFF
                  text_opa: 100%
                  text_font: font_roboto_82

              # -----------------------------------------
              # SETPOINT LABEL
              # -----------------------------------------
              - label:
                  id: dhw_setpoint_label
                  align: CENTER
                  text: "--.-°"
                  text_font: montserrat_42
                  text_color: 0x2095F6
                  y: 20

              # -----------------------------------------
              # DHW ENABLE BUTTON (WATER DROP ICON - LEFT SIDE)
              # -----------------------------------------
              - button:
                  id: btn_dhw_enable
                  align: CENTER
                  x: -60
                  y: 125
                  width: 70
                  height: 44
                  bg_opa: 0%
                  shadow_width: 0
                  widgets:
                    - label:
                        id: lbl_dhw_enable_text
                        align: CENTER 
                        text: "\U000F0E0A" 
                        text_font: icon_font_big
                        text_color: 2697513 # Default muted color
                        bg_opa: 0% 
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.turn_on
                          data:
                            entity_id: switch.opentherm_gateway_dhw_enable

              # -----------------------------------------------------
              # DHW DISABLE BUTTON (OFF ICON - RIGHT SIDE)
              # -----------------------------------------------------
              - button:
                  id: btn_dhw_disable
                  align: CENTER
                  x: 60
                  y: 125
                  width: 70
                  height: 44
                  bg_opa: 0%
                  shadow_width: 0
                  widgets:
                    - label:
                        id: lbl_dhw_disable_text
                        align: CENTER
                        text: "\U000F0425" 
                        text_font: icon_font_big
                        text_color: 2697513 # Default muted color
                        bg_opa: 0%
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.turn_off
                          data:
                            entity_id: switch.opentherm_gateway_dhw_enable

              # -----------------------------------------------------
              # BOTTOM NAVIGATION BAR
              # -----------------------------------------------------
              - obj:
                  align: CENTER
                  x: 0
                  y: 190
                  width: 100%
                  height: 60
                  bg_color: black
                  bg_opa: transp
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  widgets:
                        
                    # 1. Central Heating Page Icon (Left Section)
                    - button:
                        id: dhw_nav_ch_btn
                        align: LEFT_MID
                        x: 10%
                        y: 0
                        width: 60
                        height: 44
                        bg_opa: 0%
                        shadow_width: 0
                        on_click:
                          - lvgl.page.show:
                              id: ch_page
                              animation: FADE_IN
                        widgets:
                          - label:
                              align: CENTER
                              text: "\U000F1A45"
                              text_color: 0x566275
                              text_font: icon_font_big

                    # 2. First Divider Line (33% Mark)
                    - label:
                        align: LEFT_MID
                        x: 33%
                        y: -2
                        text: "|"
                        text_color: 0x222C3E
                        text_font: montserrat_30

                    # 3. Home Page Icon (Right Section)
                    - button:
                        id: dhw_nav_home_btn
                        align: CENTER
                        x: 0
                        y: 0
                        width: 60
                        height: 44
                        bg_opa: 0%
                        shadow_width: 0
                        on_click:
                          - lvgl.page.show:
                              id: daily_page
                              animation: FADE_IN
                        widgets:
                          - label:
                              align: CENTER
                              text: "\U000F02DC"
                              text_color: 0x566275
                              text_font: icon_font_big
    
                    # 4. Second Divider Line (66% Mark)
                    - label:
                        align: LEFT_MID
                        x: 66%
                        y: -2
                        text: "|"
                        text_color: 0x222C3E
                        text_font: montserrat_30

                    # 5. Domestic Hot Water Page Icon (Center Section)
                    - button:
                        id: dhw_nav_dhw_btn
                        align: RIGHT_MID
                        x: -10%
                        y: 0
                        width: 60
                        height: 44
                        bg_opa: 0%
                        shadow_width: 0
                        widgets:
                          - label:
                              align: CENTER
                              text: "\U000F1B29" 
                              text_color: 0x2095F6
                              text_font: icon_font_big
