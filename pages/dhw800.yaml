    # -----------------------------------------------------
    # PAGE 3 — DHW THERMOSTAT PAGE
    # -----------------------------------------------------
#    - id: dhw_page
#      widgets:

        # -----------------------------------------------
        # MAIN DHW CONTAINER (dark 50% background)
        # -----------------------------------------------
        - obj:
            width: 100%
            height: 100%
            bg_color: black
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:

              # -----------------------------------------
              # ARC (centered)
              # -----------------------------------------
              - arc:
                  id: dhw_arc
                  align: CENTER
                  x: 0
                  width: 420
                  height: 420
                  adjustable: true
                  value: 50
                  min_value: 35
                  max_value: 60
                  arc_width: 24
                  arc_color: 0x292929
                  border_width: 0
                  radius: 0
                  indicator:
                    arc_color: 0x2095F6
                    arc_width: 24
                  knob:
                    bg_color: 0xFFFFFF
                  on_value:
                    then:
                      # 1. Update the label immediately
                      - lvgl.label.update:
                          id: dhw_setpoint_label
                          text: !lambda |-
                            char buf[16];
                            snprintf(buf, sizeof(buf), "%.1f°", x);
                            return std::string(buf);

                      # 2. Only write to HA if API is connected (prevents crashes)
#                      - if:
#                          condition:
#                            api.connected:
#                          then:
#                            - homeassistant.service:
#                                service: climate.set_temperature
#                                data:
#                                  entity_id: climate.opentherm_gateway_heating_climate
#                                  temperature: !lambda "return x;"

              # -----------------------------------------
              # SETPOINT LABEL
              # -----------------------------------------
              - label:
                  id: dhw_setpoint_label
                  align: CENTER
                  text: "--.-°"
                  y: 0
                  text_color: 0xFFFFFF
                  text_opa: 100%
                  text_font: font_roboto_82

              # -----------------------------------------
              # CURRENT DHW TEMPERATURE
              # -----------------------------------------
              - label:
                  id: dhw_current_temp
                  align: CENTER
                  text: "--.-°"
                  text_font: montserrat_42
                  text_color: 0x2095F6
                  y: 120

              # -----------------------------------------
              # DHW ENABLE / DISABLE BUTTON
              # -----------------------------------------
              - button:
                  id: btn_dhw_disable
                  align: CENTER
                  #x: -50
                  y: 190
                  width: 70
                  checkable: true
                  bg_color: 0x292929
                  shadow_width: 0
                  pressed:
                    bg_color: 0x2095F6
                  checked:
                    bg_color: 0x606060
                  widgets:
                    - label:
                        id: lbl_dhw_disable_text
                        align: CENTER
                        text: 'OFF'
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.toggle
                          data:
                            entity_id: switch.opentherm_gateway_dhw_enable

              - button:
                  id: btn_dhw_enable
                  align: CENTER
                  #x: 50
                  y: 190
                  width: 70
                  checkable: true
                  bg_color: 0x292929
                  shadow_width: 0
                  pressed:
                    bg_color: 0x2095F6
                  checked:
                    bg_color: 0x2095F6
                  widgets:
                    - label:
                        id: lbl_dhw_enable_text
                        align: CENTER
                        text: 'ON'
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.toggle
                          data:
                            entity_id: switch.opentherm_gateway_dhw_enable

              # -----------------------------------------------
              # BACK TO CH PAGE
              # -----------------------------------------------
              - button:
                  id: btn_dhw_to_ch
                  align: top_right
                  x: -20
                  y: 20
                  width: 68
                  height: 68
                  bg_color: orange
                  bg_opa: 100%
                  radius: 12
                  shadow_width: 0
          #        text_font: montserrat_32
          #            pressed:
          #              bg_color: 0xFF6F22
                  widgets:
                    - label:
                        align: CENTER
                        text: "\U000F0975"
                        text_font: icon_font_big
                        text_color: black
                  on_click:
                    - lvgl.page.show:
                        id: ch_page
                        animation: FADE_IN
                        time: 300ms

        # -----------------------------------------------
        # BACK TO WEATHER PAGE
        # -----------------------------------------------
              - button:
                  id: btn_dhw_to_weather
                  align: top_left
                  x: 20
                  y: 20
                  width: 68
                  height: 68
                  bg_color: white
                  bg_opa: 100%
                  radius: 12
                  shadow_width: 0
                  widgets:
                    - label:
                        align: CENTER
                        text: "\U000F02DC"
                        text_font: icon_font_big
                        text_color: black
                  on_click:
                    - lvgl.page.show:
                        id: daily_page
                        animation: FADE_IN
                        time: 300ms
