- obj:
    width: 100%
    height: 100%
    bg_opa: 100%
    border_opa: transp
    bg_image_src: bg_img
    bg_image_opa: 100%
    radius: 0px
    layout:
      type: flex
      flex_flow: row_wrap
      flex_align_main: center
      flex_align_cross: center
      flex_align_track: center
    widgets:
      # HOURLY FORECAST

      - obj:
          width: 127
          height: 370
          bg_color: black
          bg_opa: 70%
          border_opa: transp
          radius: 5px
          layout:
            type: flex
            flex_flow: column_wrap
            flex_align_cross: center
            flex_align_track: center
          scrollbar_mode: "OFF"
          widgets:
            - label:
                id: lbl_hour6_time
                text_font: lg
                text_color: white
                pad_top: -10px
                pad_bottom: -10px
            - image:
                id: img_hour6_code
                src: missing
                align: center
                pad_top: -10px
                pad_bottom: -10px
            - label:
                align: center
                text_font: xxsm
                text_color: white
                text: "TEMPERATURE"
            - label:
                id: lbl_hour6_temp
                align: center
                text_font: sm
                text_color: white
                pad_top: -10px
            - label:
                align: center
                text_font: xxsm
                text_color: white
                text: "PRECIPITATIONS"
            - label:
                id: lbl_hour6_preprob
                align: center
                text_font: sm
                text_color: white
                pad_top: -10px
            - label:
                id: lbl_hour6_preacc
                align: center
                text_font: sm
                text_color: white
                pad_top: -10px
            - label:
                align: center
                text_font: xxsm
                text_color: white
                text: "WIND SPEED"
            - label:
                id: lbl_hour6_wind
                align: center
                text_font: sm
                text_color: white
                pad_top: -10px
