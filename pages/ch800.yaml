    # -----------------------------------------------------
    # PAGE 2 — CH THERMOSTAT PAGE
    # -----------------------------------------------------
#    - id: ch_page
#      widgets:

        # -----------------------------------------------
        # BACK TO WEATHER BUTTON (top-left)
        # -----------------------------------------------
        - button:
            id: btn_ch_to_weather
            align: top_left
            x: 10
            y: 10
            width: 68
            height: 68
            bg_color: white
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F04D2"   # mdi-arrow-left
                  text_font: icon_font
                  text_color: black
            on_click:
              - lvgl.page.show:
                  id: daily_page
                  animation: MOVE_RIGHT
                  time: 300ms

        # -----------------------------------------------
        # MAIN CH CONTAINER
        # -----------------------------------------------
        - obj:
            width: 100%
            height: 100%
            bg_color: black
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false

            widgets:

              # -----------------------------------------
              # ARC (centered)
              # -----------------------------------------
              - arc:
                  id: ch_arc
                  align: CENTER
                  x: 0
#                  y: -20              # move slightly up
                  width: 420
                  height: 420
                  adjustable: true
                  value: 50
                  min_value: 50
                  max_value: 300
                  arc_width: 24
                  arc_color: 0x292929
                  border_width: 0
                  radius: 0
                  indicator:
                    arc_color: 0xFF6F22
                    arc_width: 24
                  knob:
                    bg_color: 0xFFFFFF
#                  on_value:
#                    then:
#                      # 1. Update the label immediately
#                      - lvgl.label.update:
#                          id: ch_setpoint_label
#                          text: !lambda |-
#                            char buf[16];
#                            snprintf(buf, sizeof(buf), "%.1f°", x);
#                            return std::string(buf);

#                      # 2. Only write to HA if API is connected (prevents crashes)
#                      - if:
#                          condition:
#                            api.connected:
#                          then:
#                            - homeassistant.service:
#                                service: climate.set_temperature
#                                data:
#                                  entity_id: climate.opentherm_gateway_heating_climate
#                                  temperature: !lambda "return x;"

              - label:
                  id: ch_action_label
                  align: CENTER
                  y: -80
                  text_font: montserrat_20
                  text: "--"
                  text_color: 0xFF6F22

              # -----------------------------------------
              # SETPOINT LABEL
              # -----------------------------------------
              - label:
                  id: ch_setpoint_label
                  align: CENTER
                  text: "--.-°"
                  y: 0
                  text_color: 0xFFFFFF
                  text_opa: 100%
                  text_font: font_roboto_72

              # -----------------------------------------
              # CURRENT ROOM TEMPERATURE
              # -----------------------------------------
              - label:
                  id: ch_current_temp
                  align: CENTER
                  text: "--.-°"
                  text_font: montserrat_32
                  text_color: 0xFF6F22
                  y: 100

              # -----------------------------------------
              # CH ENABLE / DISABLE BUTTON (NOW VISIBLE)
              # -----------------------------------------
              - button:
                  id: btn_ch_disable
                  align: CENTER
                  x: -50
                  y: 190
                  width: 70
                  checkable: true
                  bg_color: 0x292929
                  shadow_width: 0
                  pressed:
                    bg_color: 0xFF6F22
                  checked:
                    bg_color: 0x606060
                  widgets:
                    - label:
                        align: CENTER
                        text: 'OFF'
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.toggle
                          data:
                            entity_id: switch.opentherm_gateway_heating_enable

              - button:
                  id: btn_ch_enable
                  align: CENTER
                  x: 50
                  y: 190
                  width: 70
                  checkable: true
                  bg_color: 0x292929
                  shadow_width: 0
                  pressed:
                    bg_color: 0xFF6F22
                  checked:
                    bg_color: 0xFF6F22
                  widgets:
                    - label:
                        align: CENTER
                        text: 'HEAT'
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.toggle
                          data:
                            entity_id: switch.opentherm_gateway_heating_enable

              # -----------------------------------------------
              # GO TO DHW PAGE BUTTON (top-right)
              # -----------------------------------------------
              - button:
                  id: go_dhw_button
                  align: CENTER
                  x: 196
                  y: -180
                  width: 54
                  height: 54
                  bg_color: 0x000000
                  shadow_width: 0
                  text_font: montserrat_32
                  pressed:
                    bg_color: 0xFF6F22
                  widgets:
                    - label:
                        align: CENTER
                        text: "\uF054"
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: dhw_page
                          animation: MOVE_LEFT
                          time: 300ms

