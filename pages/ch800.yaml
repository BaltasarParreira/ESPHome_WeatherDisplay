    # -----------------------------------------------------
    # PAGE 2 — CH THERMOSTAT PAGE
    # -----------------------------------------------------
#    - id: ch_page
#      widgets:

        # -----------------------------------------------
        # BACK TO WEATHER BUTTON (top-left)
        # -----------------------------------------------
        - button:
            id: btn_ch_to_weather
            align: top_left
            x: 10
            y: 10
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F04D2"   # mdi-arrow-left
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: daily_page
                  animation: MOVE_RIGHT
                  time: 300ms

        # -----------------------------------------------
        # GO TO DHW PAGE BUTTON (top-right)
        # -----------------------------------------------
        - button:
            id: btn_ch_to_dhw
            align: top_right
            x: -10
            y: 10
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F054C"   # mdi-arrow-right
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: dhw_page
                  animation: MOVE_LEFT
                  time: 300ms

        - obj:
            width: 100%
            height: 100%
            bg_color: black
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false

            layout:
              type: grid
              grid_rows: 60fr 300fr 120fr     # total = 480px
              grid_columns: 1fr

            widgets:

              # -----------------------------------------
              # TOP SPACER (60px)
              # -----------------------------------------
              - obj:
                  grid_cell_row: 0
                  grid_cell_column: 0
                  width: 100%
                  height: 100%
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 0

              # -----------------------------------------
              # ARC ZONE (300px)
              # -----------------------------------------
              - obj:
                  grid_cell_row: 1
                  grid_cell_column: 0
                  width: 100%
                  height: 100%
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_main: center
                    flex_align_cross: center
                  widgets:
                    - arc:
                        id: ch_arc
                        align: CENTER
                        width: 260
                        height: 260
                        adjustable: true
                        value: 50
                        min_value: 50
                        max_value: 300
                        arc_width: 22
                        arc_color: 0x292929
                        border_width: 0
                        radius: 0
                        indicator:
                          arc_color: 0xFF6F22
                          arc_width: 22
                        knob:
                          bg_color: 0xFFFFFF
                        on_value:
                          then:
                            - homeassistant.service:
                                service: number.set_value
                                data:
                                  entity_id: number.ch_setpoint
                                  value: !lambda "return x;"

              # -----------------------------------------
              # BOTTOM ZONE (120px)
              # -----------------------------------------
              - obj:
                  grid_cell_row: 2
                  grid_cell_column: 0
                  width: 100%
                  height: 100%
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_main: start
                    flex_align_cross: center
                  widgets:

                    - label:
                        id: ch_current_temp
                        text_font: xlg
                        text_color: white
                        text_align: center
                        text: "-- °C"
                        border_width: 0
                        radius: 0

                    - label:
                        id: ch_setpoint_label
                        align: CENTER
                        text: "--.-°"
                        text_font: font_roboto_72
                        border_width: 0
                        radius: 0

                    - button:
                        id: btn_ch_enable
                        width: 160
                        height: 60
                        bg_color: black
                        bg_opa: 60%
                        radius: 12
                        shadow_width: 0
                        border_width: 0
                        widgets:
                          - label:
                              id: ch_enable_label
                              text_font: mdb
                              text_color: white
                              text: "CH OFF"
                              align: CENTER
                        on_click:
                          then:
                            - homeassistant.service:
                                service: switch.toggle
                                data:
                                  entity_id: switch.opentherm_gateway_heating_enable
