    # -----------------------------------------------------
    # PAGE 2 — CH THERMOSTAT PAGE
    # -----------------------------------------------------
 #   - id: ch_page
 #     widgets:

        # -----------------------------------------------
        # BACK TO WEATHER BUTTON (top-left)
        # -----------------------------------------------
        - button:
            id: btn_ch_to_weather
            align: top_left
            x: 10
            y: 10
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  text: "\U000F04D2"   # mdi-arrow-left
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: weather_page
                  animation: MOVE_RIGHT
                  time: 300ms

        # -----------------------------------------------
        # GO TO DHW PAGE BUTTON (top-right)
        # -----------------------------------------------
        - button:
            id: btn_ch_to_dhw
            align: top_right
            x: -10
            y: 10
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  text: "\U000F054C"   # mdi-arrow-right
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: dhw_page
                  animation: MOVE_LEFT
                  time: 300ms

        # -----------------------------------------------
        # MAIN CH CONTAINER (dark 50% background)
        # -----------------------------------------------
        - obj:
            width: 100%
            height: 100%
            bg_color: black
            bg_opa: 50%
            radius: 15
            layout:
              type: flex
              flex_flow: column
              flex_align_main: center
              flex_align_cross: center
            widgets:

              # -----------------------------------------
              # LARGE ARC (300px)
              # -----------------------------------------
                - arc:
                    id: ch_arc
                    width: 300
                    height: 300
                    start_angle: 135
                    end_angle: 45
                    min_value: 30
                    max_value: 80
                    value: 50
                    on_value:
                      then:
                        - homeassistant.service:
                            service: number.set_value
                            data:
                              entity_id: number.ch_setpoint
                              value: !lambda "return x;"

              # -----------------------------------------
              # CURRENT ROOM TEMPERATURE
              # -----------------------------------------
              - label:
                  id: ch_current_temp
                  text_font: xlg
                  text_color: white
                  text_align: center
                  text: "-- °C"

              # -----------------------------------------
              # SETPOINT LABEL
              # -----------------------------------------
              - label:
                  id: ch_setpoint_label
                  text_font: lg
                  text_color: white
                  text_align: center
                  text: "Setpoint"

              # -----------------------------------------
              # CH ENABLE / DISABLE BUTTON
              # -----------------------------------------
              - button:
                  id: btn_ch_enable
                  width: 160
                  height: 60
                  bg_color: black
                  bg_opa: 60%
                  radius: 12
                  widgets:
                    - label:
                        id: ch_enable_label
                        text_font: mdb
                        text_color: white
                        text: "CH OFF"
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.toggle
                          data:
                            entity_id: switch.heating_enable
