    # -----------------------------------------------------
    # PAGE 2 — CH THERMOSTAT PAGE
    # -----------------------------------------------------
#    - id: ch_page
#      widgets:

        # -----------------------------------------------
        # BACK TO WEATHER BUTTON (top-left)
        # -----------------------------------------------
        - button:
            id: btn_ch_to_weather
            align: top_left
            x: 10
            y: 10
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F04D2"   # mdi-arrow-left
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: daily_page
                  animation: MOVE_RIGHT
                  time: 300ms

        # -----------------------------------------------
        # GO TO DHW PAGE BUTTON (top-right)
        # -----------------------------------------------
        - button:
            id: btn_ch_to_dhw
            align: top_right
            x: -10
            y: 10
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F054C"   # mdi-arrow-right
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: dhw_page
                  animation: MOVE_LEFT
                  time: 300ms

        # -----------------------------------------------
        # MAIN CH CONTAINER (full screen)
        # -----------------------------------------------
        - obj:
            width: 100%
            height: 100%
            bg_color: black
            bg_opa: 100%
            border_width: 0

            layout:
              type: flex
              flex_flow: column
              flex_align_main: center     # <— CENTER vertically
              flex_align_cross: center    # <— CENTER horizontally

            widgets:

              # -----------------------------------------
              # ARC ZONE (centered)
              # -----------------------------------------
              - arc:
                  id: ch_arc
                  align: CENTER
                  width: 260          # <— fits 800×480 perfectly
                  height: 260
                  adjustable: true
                  value: 50
                  min_value: 50
                  max_value: 300
                  arc_width: 22
                  arc_color: 0x292929
                  border_width: 0
                  indicator:
                    arc_color: 0xFF6F22
                    arc_width: 22
                  knob:
                    bg_color: 0xFFFFFF
                  on_value:
                    then:
                      - homeassistant.service:
                          service: number.set_value
                          data:
                            entity_id: number.ch_setpoint
                            value: !lambda "return x;"

              # -----------------------------------------
              # CURRENT ROOM TEMPERATURE
              # -----------------------------------------
              - label:
                  id: ch_current_temp
                  text_font: xlg
                  text_color: white
                  text_align: center
                  text: "-- °C"
                  border_width: 0

              # -----------------------------------------
              # SETPOINT LABEL
              # -----------------------------------------
              - label:
                  id: ch_setpoint_label
                  align: CENTER
                  text: "--.-°"
                  y: 0
                  text_font: font_roboto_72
                  border_width: 0

              # -----------------------------------------
              # CH ENABLE / DISABLE BUTTON
              # -----------------------------------------
              - button:
                  id: btn_ch_enable
                  width: 160
                  height: 60
                  bg_color: black
                  bg_opa: 60%
                  radius: 12
                  shadow_width: 0
                  border_width: 0
                  widgets:
                    - label:
                        id: ch_enable_label
                        text_font: mdb
                        text_color: white
                        text: "CH OFF"
                        align: CENTER
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.toggle
                          data:
                            entity_id: switch.opentherm_gateway_heating_enable
