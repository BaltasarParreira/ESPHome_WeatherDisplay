    # -----------------------------------------------------
    # PAGE 2 — CH THERMOSTAT PAGE
    # -----------------------------------------------------
#    - id: ch_page
#      widgets:

        # -----------------------------------------------
        # MAIN CH CONTAINER
        # -----------------------------------------------
        - obj:
            width: 100%
            height: 100%
            bg_color: black
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:

              # -----------------------------------------
              # ARC (centered)
              # -----------------------------------------
              - arc:
                  id: ch_arc
                  align: CENTER
                  x: 0
                  width: 420
                  height: 420
                  adjustable: true
                  value: 50
                  min_value: 15
                  max_value: 30
                  arc_width: 24
                  arc_color: 0x292929
                  border_width: 0
                  radius: 0
                  indicator:
                    arc_color: 0xFF6F22
                    arc_width: 24
                  knob:
                    bg_color: 0xFFFFFF
                  on_value:
                    then:
                      # 1. Update the label immediately
                      - lvgl.label.update:
                          id: ch_setpoint_label
                          text: !lambda |-
                            char buf[16];
                            snprintf(buf, sizeof(buf), "%.1f°", x);
                            return std::string(buf);

                      # 2. Only write to HA if API is connected (prevents crashes)
                      - if:
                          condition:
                            api.connected:
                          then:
                            - homeassistant.service:
                                service: climate.set_temperature
                                data:
                                  entity_id: climate.opentherm_gateway_central_heating
                                  temperature: !lambda "return x;"

              # -----------------------------------------
              # SETPOINT LABEL
              # -----------------------------------------
              - label:
                  id: ch_current_temp
                  align: CENTER
                  text: "--.-°"
                  y: -90
                  text_color: 0xFFFFFF
                  text_opa: 100%
                  text_font: font_roboto_82

              # -----------------------------------------
              # CURRENT ROOM TEMPERATURE
              # -----------------------------------------
              - label:
                  id: ch_setpoint_label
                  align: CENTER
                  text: "--.-°"
                  text_font: montserrat_42
                  text_color: 0xFF6F22
                  y: 20

              - label:
                  id: ch_action_label
                  align: CENTER
                  y: 80
                  #text_font: montserrat_30
                  text: "--"
                  text_color: 0xFF6F22

              # -----------------------------------------------------
              # CH ENABLE BUTTON (HEAT / FIRE ICON - LEFT SIDE)
              # -----------------------------------------------------
              - button:
                  id: btn_ch_enable
                  align: CENTER
                  x: -60
                  y: 125
                  width: 70
                  height: 44
                  bg_opa: 0%              # Completely clear background
                  shadow_width: 0
                  widgets:
                    - label:
                        id: lbl_ch_enable_text
                        align: CENTER 
                        text: "\U000F0238"     # Clean, cross-compatible flame glyph
                        text_font: icon_font_big
                        text_color: 2697513 # Default muted color
                        bg_opa: 0%        
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.turn_on
                          data:
                            entity_id: switch.opentherm_gateway_ch_enable

              # -----------------------------------------------------
              # CH DISABLE BUTTON (OFF ICON - RIGHT SIDE)
              # -----------------------------------------------------
              - button:
                  id: btn_ch_disable
                  align: CENTER
                  x: 60
                  y: 125
                  width: 70
                  height: 44
                  bg_opa: 0%              # Completely clear background
                  shadow_width: 0
                  widgets:
                    - label:
                        id: lbl_ch_disable_text
                        align: CENTER
                        text: "\U000F0425"     # Clean, cross-compatible power glyph
                        text_font: icon_font_big
                        text_color: 2697513 # Default muted color
                        bg_opa: 0%        
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.turn_off
                          data:
                            entity_id: switch.opentherm_gateway_ch_enable


              # -----------------------------------------------------
              # BOTTOM NAVIGATION BAR
              # -----------------------------------------------------
              - obj:
                  align: CENTER
                  x: 0
                  y: 190
                  width: 100%
                  height: 60
                  bg_color: black
                  bg_opa: transp
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  widgets:
                        
                    # 1. Central Heating Page Icon (Left Section)
                    - button:
                        id: nav_ch_btn
                        align: LEFT_MID
                        x: 10%
                        y: 0
                        width: 60
                        height: 44
                        bg_opa: 0%
                        shadow_width: 0
                        widgets:
                          - label:
                              align: CENTER
                              text: "\U000F1A45"
                              text_color: 0xFF6F22
                              text_font: icon_font_big

                    # 2. First Divider Line (33% Mark)
                    - label:
                        align: LEFT_MID
                        x: 33%
                        y: -2
                        text: "|"
                        text_color: 0x222C3E
                        text_font: montserrat_30

                    # 3. Domestic Hot Water Page Icon (Center Section)
                    - button:
                        id: nav_dhw_btn
                        align: CENTER
                        x: 0
                        y: 0
                        width: 60
                        height: 44
                        bg_opa: 0%
                        shadow_width: 0
                        on_click:
                          - lvgl.page.show:
                              id: dhw_page
                              animation: FADE_IN
                        widgets:
                          - label:
                              align: CENTER
                              text: "\U000F1B29" 
                              text_color: 0x566275
                              text_font: icon_font_big
    
                    # 4. Second Divider Line (66% Mark)
                    - label:
                        align: LEFT_MID
                        x: 66%
                        y: -2
                        text: "|"
                        text_color: 0x222C3E
                        text_font: montserrat_30

                    # 5. Settings Page Icon (Right Section)
                    - button:
                        id: nav_settings_btn
                        align: RIGHT_MID
                        x: -10%
                        y: 0
                        width: 60
                        height: 44
                        bg_opa: 0%
                        shadow_width: 0
                        on_click:
                          - lvgl.page.show:
                              id: daily_page
                              animation: FADE_IN
                        widgets:
                          - label:
                              align: CENTER
                              text: "\U000F02DC"
                              text_color: 0x566275
                              text_font: icon_font_big
