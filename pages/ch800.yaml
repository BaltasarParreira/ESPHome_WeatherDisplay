    # -----------------------------------------------------
    # PAGE 2 — CH THERMOSTAT PAGE
    # -----------------------------------------------------
#    - id: ch_page
#      widgets:

        # -----------------------------------------------
        # BACK TO WEATHER BUTTON (top-left)
        # -----------------------------------------------
        - button:
            id: btn_ch_to_weather
            align: top_left
            x: 10
            y: 10
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  text: "\U000F04D2"   # mdi-arrow-left
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: daily_page
                  animation: MOVE_RIGHT
                  time: 300ms

        # -----------------------------------------------
        # GO TO DHW PAGE BUTTON (top-right)
        # -----------------------------------------------
        - button:
            id: btn_ch_to_dhw
            align: top_right
            x: -10
            y: 10
            width: 48
            height: 48
            bg_color: black
            bg_opa: 60%
            radius: 12
            shadow_width: 0
            widgets:
              - label:
                  text: "\U000F054C"   # mdi-arrow-right
                  text_font: icon_font
                  text_color: white
            on_click:
              - lvgl.page.show:
                  id: dhw_page
                  animation: MOVE_LEFT
                  time: 300ms

        # -----------------------------------------------
        # MAIN CH CONTAINER
        # -----------------------------------------------
        - obj:
            width: 100%
            height: 100%
            bg_color: black
            bg_opa: TRANSP
            radius: 15
            layout:
              type: flex
              flex_flow: column
              flex_align_main: center
              flex_align_cross: center
            widgets:

              # -----------------------------------------
              # LARGE ARC
              # -----------------------------------------
              - arc:
                  id: ch_setpoint_arc
                  align: CENTER
                  y: 20
                  adjustable: true
                  value: 50
                  min_value: 50
                  max_value: 300
                  width: 420
                  height: 420
                  arc_width: 24
                  arc_color: 0x292929
                  indicator:
                    arc_color: 0xFF6F22
                    arc_width: 24
                  knob:
                    bg_color: 0xFFFFFF
                  on_value:
                    then:
                      - homeassistant.service:
                          service: number.set_value
                          data:
                            entity_id: number.ch_setpoint
                            value: !lambda "return x;"

              # -----------------------------------------
              # CURRENT ROOM TEMPERATURE
              # -----------------------------------------
              - label:
                  id: ch_current_temp
                  text_font: xlg
                  text_color: white
                  text_align: center
                  text: "-- °C"

              # -----------------------------------------
              # SETPOINT LABEL
              # -----------------------------------------
              - label:
                  id: ch_setpoint_label
                  align: CENTER
                  text: "--.-°"
                  y: 0
                  text_font: font_roboto_72

              # -----------------------------------------
              # CH OFF BUTTON
              # -----------------------------------------
              - button:
                  id: ch_off_button
                  align: CENTER
                  x: -50
                  y: 190
                  width: 70
                  checkable: true
                  bg_color: 0x292929
                  shadow_width: 0
                  pressed:
                    bg_color: 0xFF6F22
                  checked:
                    bg_color: 0x606060
                  widgets:
                    - label:
                        align: CENTER
                        text: 'OFF'
                  on_click:
                    then:
                      - switch.turn_off: ch_enable

              # -----------------------------------------
              # CH ON BUTTON
              # -----------------------------------------
              - button:
                  id: ch_on_button
                  align: CENTER
                  x: 50
                  y: 190
                  width: 70
                  checkable: true
                  bg_color: 0x292929
                  shadow_width: 0
                  pressed:
                    bg_color: 0xFF6F22
                  checked:
                    bg_color: 0xFF6F22
                  widgets:
                    - label:
                        align: CENTER
                        text: 'HEAT'
                  on_click:
                    then:
                      - switch.turn_on: ch_enable
