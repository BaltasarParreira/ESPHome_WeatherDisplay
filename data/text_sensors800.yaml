  - platform: homeassistant
    id: ha_dhw_temp
    entity_id: sensor.opentherm_gateway_ch_temperature # sensor.opentherm_gateway_hot_water_temperature  # N/A ????
    on_value:
       then:
         - lvgl.label.update:
             id: dhw_current_temp
             text: !lambda |-
               // Handle unavailable or empty states safely
               if (x == "unknown" || x == "unavailable" || x.empty()) {
                 return std::string("--.-°");
               }

               // Convert text to number
               char* endptr;
               float v = strtof(x.c_str(), &endptr);

               // Validate conversion succeeded and didn't hit trailing garbage
               if (endptr == x.c_str()) {
                 return std::string("--.-°");
               }

               char buf[16];
               snprintf(buf, sizeof(buf), "%.1f°", v);
               return std::string(buf);

  - platform: homeassistant
    id: ha_dhw_enable_state
    entity_id: switch.opentherm_gateway_dhw_enable
    on_value:
        then:
          - if:
              condition:
                lambda: 'return x == "off";'
              then:
                # DHW is OFF
                - lvgl.arc.update:
                    id: dhw_arc
                    indicator:
                      arc_color: 0x292929

                - lvgl.label.update:
                    id: lbl_dhw_enable_text
                    text_color: 0x292929
                - lvgl.label.update:
                    id: lbl_dhw_disable_text
                    text_color: 0x2095F6
              else:
                # DHW is ON
                - lvgl.arc.update:
                    id: dhw_arc
                    indicator:
                      arc_color: 0x2095F6

                - lvgl.label.update:
                    id: lbl_dhw_enable_text
