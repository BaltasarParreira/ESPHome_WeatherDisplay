sensor:
  - platform: homeassistant
    id: ha_ch_setpoint
    entity_id: climate.opentherm_gateway_heating_climate
    attribute: temperature
    on_value:
      then:
        - delay: 200ms
        - lambda: |-
            ESP_LOGI("CH", "Setpoint update: x=%f", x);
        - lvgl.arc.update:
            id: ch_arc
            value: !lambda |-
              return (int)x;
  
        - lvgl.label.update:
            id: ch_setpoint_label
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f°", x);
              return std::string(buf);
