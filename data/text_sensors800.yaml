  #### NEW SENSORS ####
  - platform: homeassistant
    id: ha_ch_temp
    entity_id: climate.opentherm_gateway_heating_climate
    attribute: current_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: ch_current_temp
            text: !lambda |-
              // x is a std::string
              float v = atof(x.c_str());
              if (v == 0 && x != "0" && x != "0.0") {
                return std::string("--.-°");
              }
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f °C", v);
              return std::string(buf);

  - platform: homeassistant
    id: ha_ch_action
    entity_id: climate.opentherm_gateway_heating_climate
    attribute: hvac_action
    on_value:
        then:
          - lvgl.label.update:
              id: ch_action_label
              text: !lambda |-
                // x is a std::string
                if (x == "heating") return std::string("HEATING");
                if (x == "idle")    return std::string("IDLE");
                if (x == "off")     return std::string("OFF");
                return std::string("--");

