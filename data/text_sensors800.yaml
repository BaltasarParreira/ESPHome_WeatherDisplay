  #### NEW SENSORS ####
  - platform: homeassistant
    id: ha_ch_temp
    entity_id: climate.opentherm_gateway_central_heating
    attribute: current_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: ch_current_temp
            text: !lambda |-
              // x is a std::string
              float v = atof(x.c_str());
              if (v == 0 && x != "0" && x != "0.0") {
                return std::string("--.-°");
              }
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f°", v);
              return std::string(buf);

  - platform: homeassistant
    id: ha_ch_action
    entity_id: climate.opentherm_gateway_central_heating
    attribute: hvac_action
    on_value:
        then:
          - lvgl.label.update:
              id: ch_action_label
              text: !lambda |-
                // Make a copy of x to mutate safely
                std::string str = x;
                
                // 1. Force the string completely into lowercase characters to prevent case failures
                std::transform(str.begin(), str.end(), str.begin(), ::tolower);
                
                // 2. Scan using substrings (.find) to handle accidental quotes or extra text
                if (str.find("heating") != std::string::npos) return std::string("HEATING");
                if (str.find("idle")    != std::string::npos) return std::string("IDLE");
                if (str.find("off")     != std::string::npos) return std::string("OFF");
                
                // If Home Assistant sends something unexpected, print it on screen to debug it
                return "ERR: " + x;

