time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lvgl.label.update:
              id: lbl_datetime
              text: !lambda |-
                auto t = id(sntp_time).now();
                return t.strftime("%H:%M\n%A, %B %e");
          - lvgl.label.update:
              id: clock_saver_time
              text: !lambda |-
                auto t = id(sntp_time).now();
                return t.strftime("%H:%M");
          - lvgl.label.update:
              id: clock_saver_date
              text: !lambda |-
                auto t = id(sntp_time).now();
                return t.strftime("%A, %B %e");
          - script.execute: backlight_saver

    on_time_sync:
        then:
          - lvgl.label.update:
              id: lbl_datetime
              text: !lambda |-
                auto t = id(sntp_time).now();
                return t.strftime("%H:%M\n%A, %B %e");
          - lvgl.label.update:
              id: clock_saver_time
              text: !lambda |-
                auto t = id(sntp_time).now();
                return t.strftime("%H:%M");
          - lvgl.label.update:
              id: clock_saver_date
              text: !lambda |-
                auto t = id(sntp_time).now();
                return t.strftime("%A, %B %e");
          - script.execute: backlight_saver


