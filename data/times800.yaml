time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lvgl.label.update:
              id: lbl_datetime
              text: !lambda |-
                auto t = id(sntp_time).now();
                return t.strftime("%H:%M:%S\n%A, %B %e");
    on_time_sync:
        then:
          - lvgl.label.update:
              id: lbl_datetime
              text: !lambda |-
                auto t = id(sntp_time).now();
                return t.strftime("%H:%M:%S\n%A, %B %e");
