substitutions:
  font: "fonts/OpenSans-Medium.ttf"

esphome:
  name: weatherdisplay
  friendly_name: WeatherDisplay
  platformio_options:
    board_build.arduino.memory_type: qio_opi   # --> Bal
    board_upload.maximum_ram_size: 524288   # --> Bal
    board_build.flash_mode: dio
    build_flags:
      - "-DCONFIG_LV_DISP_DEF_REFR_PERIOD=10"
      - "-DLV_DRAW_SW_SUPPORT_RGB565=1"
      - "-DCONFIG_COMPILER_OPTIMIZATION_PERF=y"
      - "-Wno-deprecated-declarations"
#      - "-DBOARD_HAS_PSRAM"
  min_version: "2025.8.0"   # --> Bal
  on_boot:
    priority: 800.0  # Runs early during framework hardware initialization
    then:
      - lambda: |-
          setenv("TZ", "WET0WEST-1,M3.5.0/1,M10.5.0/2", 1);
          tzset();
          ESP_LOGI("main", "Forced POSIX Lisbon timezone onto ESP-IDF backend");


esp32:
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_LWIP_IPV6: "n"
      CONFIG_LWIP_SO_LINGER: "y"
      CONFIG_MBEDTLS_DYNAMIC_BUFFER: "y"
      CONFIG_FREERTOS_PLACE_FUNCTIONS_INTO_FLASH: "y"
      CONFIG_RINGBUF_PLACE_FUNCTIONS_INTO_FLASH: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG
  logs:
    lvgl: DEBUG
    display: DEBUG
    app: DEBUG

api:

ota:
  platform: esphome

json:

time:
  - platform: sntp
    id: sntp_time
    #timezone: "Europe/Lisbon"
    #timezone: "WET0WEST-1,M3.5.0/1,M10.5.0/2"

# -----------------------------
# BACKLIGHT (correct pin for Waveshare 4.3")
# -----------------------------
output:
  - platform: ledc
    pin: GPIO6
    id: backlight
    frequency: 20000Hz

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "backlight"
    output: backlight
    restore_mode: ALWAYS_ON
    # This block triggers every time HA or ESPHome turns the light on
    on_turn_on:
      then:
        - lvgl.page.show: daily_page
        - script.execute: backlight_watchdog

script:
  - id: backlight_watchdog
    mode: restart
    then:
      - light.turn_on: 
          id: lcd_backlight
          brightness: 1.00
      - delay: 2min
      - if:
                condition:
                  lambda: |-
                    auto time_now = id(sntp_time).now();
                    int hour = time_now.hour;
                    
                    // Define your hour constraints here (e.g., between 22:00 and 06:00)
                    // This logic handles ranges that cross over midnight safely
                    int start_hour = 7; 
                    int end_hour = 3;
                    
                    if (start_hour > end_hour) {
                        return (hour >= start_hour || hour < end_hour);
                    } else {
                        return (hour >= start_hour && hour < end_hour);
                    }
                then:
                  - light.turn_on:
                      id: lcd_backlight
                      brightness: !lambda |-
                        // If the Home Assistant entity shows below horizon, apply night dimming
                        if (id(ha_sun_state).state == "below_horizon") {
                          return 0.40; // 40% brightness for night
                        } else {
                          return 0.60; // 60% brightness for day
                        }
                  - lvgl.page.show: clock_page  # Target page ID to show
                else:
                  - light.turn_off: lcd_backlight

  - id: backlight_saver
    mode: restart
    then:
      - if:
                condition:
                  lambda: |-
                    auto time_now = id(sntp_time).now();
                    int hour = time_now.hour;
                    
                    // Define your hour constraints here (e.g., between 22:00 and 06:00)
                    // This logic handles ranges that cross over midnight safely
                    int start_hour = 7; 
                    int end_hour = 3;
                    
                    if (start_hour > end_hour) {
                        return (hour >= start_hour || hour < end_hour);
                    } else {
                        return (hour >= start_hour && hour < end_hour);
                    }
                then:
                  - light.turn_on: lcd_backlight
                  
                else:  
                  - light.turn_off: lcd_backlight

ch422g:
  - id: ch422g_hub

i2c:
  id: i2c_bus
  sda: GPIO08
  scl: GPIO09
  scan: true
  frequency: 400kHz

# -----------------------------
# TOUCHSCREEN (GT911)
# -----------------------------
touchscreen:
  - platform: gt911
    id: my_touch
    display: tft_display
    i2c_id: i2c_bus
    interrupt_pin: GPIO4
    reset_pin:
        ch422g: ch422g_hub
        number: 1
        mode: OUTPUT
    on_touch:
      then:
        - script.execute: backlight_watchdog
        - if:
            condition:
              light.is_on: lcd_backlight
            then:
              - lvgl.page.next:
            else:
              - lvgl.page.show: daily_page
              - light.turn_on: lcd_backlight

# -----------------------------
# DISPLAY (OFFICIAL ESPHOME MODEL)
# -----------------------------
display:
  - platform: mipi_rgb
    model: ESP32-S3-TOUCH-LCD-4.3
    id: tft_display
    update_interval: never
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 16MHZ
    dimensions:
      width: 800
      height: 480
    de_pin:
      number: 5
    hsync_pin:
      number: 46
      ignore_strapping_warning: true
    vsync_pin:
      number: 3
      ignore_strapping_warning: true
    pclk_pin: 7
    reset_pin:
      ch422g: ch422g_hub
      number: 3
    hsync_back_porch: 30
    hsync_front_porch: 210
    hsync_pulse_width: 30
    vsync_back_porch: 4
    vsync_front_porch: 4
    vsync_pulse_width: 4
    data_pins:
      red:
        - 1         #r3
        - 2         #r4
        - 42        #r5
        - 41        #r6
        - 40        #r7
      blue:
        - 14        #b3
        - 38        #b4
        - 18        #b5
        - 17        #b6
        - 10        #b7
      green:
        - 39        #g2
        - 0         #g3
        - 45        #g4
        - 48        #g5
        - 47        #g6
        - 21        #g7

# -----------------------------
# LVGL
# -----------------------------
lvgl:
  rotation: 0
  style_definitions:
    - id: clean_box
      border_width: 0
      outline_width: 0
      shadow_width: 0
      pad_all: 0
      # Force removal of residual lines
      border_opa: 0%
      outline_opa: 0%
      shadow_opa: 0%
#  byte_order: little_endian
#  color_depth: 16
#  color_format: RGB565
  buffer_size: 14%
  touchscreens:
    - touchscreen_id: my_touch

  pages:
#    - id: home_page
#      widgets: !include pages/home.yaml
    - id: daily_page
      widgets: !include pages/daily800.yaml
    - id: daily_page2
      widgets: !include pages/2daily800.yaml
    - id: hourly_page
      widgets: !include pages/hourly.yaml
    - id: clock_page
      skip: true
      widgets: !include pages/clock800.yaml

# -----------------------------
# REQUIRED DUMMY SWITCH
# -----------------------------
switch:
  - platform: homeassistant
    id: any_id
    entity_id: switch.any_id
    internal: true

packages:
  - !include data/fonts800.yaml
  - !include data/images800.yaml
  - !include data/mappings.yaml
  - !include data/text_sensors800.yaml
  - !include data/times800.yaml
